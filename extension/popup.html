<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostCrossing Tab Sorter</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.4;
            margin: 0;
            background: #f8f9fa;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 18px;
            margin: 0 0 5px 0;
            color: #333;
        }

        .header p {
            margin: 0;
            color: #666;
            font-size: 12px;
        }

        .main-button {
            background: #4096ff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }

        .main-button:hover {
            background: #1677ff;
        }

        .main-button:disabled {
            background: #d9d9d9;
            cursor: not-allowed;
        }

        .info-section {
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .info-section h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #333;
        }

        .info-section ul {
            margin: 0;
            padding-left: 20px;
            color: #666;
            font-size: 12px;
        }

        .info-section li {
            margin-bottom: 5px;
        }

        .status {
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 15px;
        }

        .status.success {
            background: #f0f9ff;
            color: #0c4a6e;
            border: 1px solid #bae6fd;
        }

        .status.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .shortcut {
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .shortcut kbd {
            background: #f1f3f4;
            border: 1px solid #dadce0;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 11px;
            font-family: monospace;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>PostCrossing Tab Sorter</h1>
        <p>Sort tabs by postcard number</p>
    </div>

    <button id="sortButton" class="main-button">
        Sort PostCrossing Tabs
    </button>

    <div id="status" class="status hidden"></div>

    <div class="info-section">
        <h3>How it works</h3>
        <ul>
            <li>Finds tabs with postcard codes (e.g., CL-34269, CN-4087990)</li>
            <li>Sorts by numeric part, then country code</li>
            <li>Keeps pinned tabs in place</li>
            <li>Preserves order of non-PostCrossing tabs</li>
        </ul>
    </div>

    <div class="shortcut">
        <strong>Keyboard shortcut:</strong><br>
        <kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>S</kbd>
    </div>

    <script src="popup.js"></script>
</body>
</html>
